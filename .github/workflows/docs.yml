name: Deploy docs

# Build the MkDocs Material site and publish it to the gh-pages branch.
# After the first successful run, set GitHub Pages source to the "gh-pages"
# branch (Settings -> Pages). The site will be at
# https://rafysta.github.io/HiCarta/

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install MkDocs Material + i18n
        run: pip install mkdocs-material mkdocs-static-i18n
      - name: Build and deploy
        run: mkdocs gh-deploy --force
