site_name: HiCarta
site_description: Interactive Hi-C contact map viewer (R + Shiny + Leaflet)
site_author: Hideki Tanizawa
site_url: https://rafysta.github.io/HiCarta/
repo_url: https://github.com/rafysta/HiCarta
repo_name: rafysta/HiCarta
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Nav references the DEFAULT-language folder (en/). The i18n plugin serves these
# at the site root "/" and maps the same pages to "/ja/". Japanese nav labels
# are set via nav_translations under the ja locale below.
nav:
  - Home: en/index.md
  - Installation: en/install.md
  - What HiCarta can do: en/features.md
  - Usage: en/usage.md
  - Screens & controls: en/interface.md
  - Data formats: en/data-formats.md
  - Setup & troubleshooting: en/setup-details.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html            # process Markdown inside HTML blocks (grid cards need this)
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:        # render :material-...: icons as inline SVG
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
  # Multi-language docs. Japanese is the source (docs/ja/), English (docs/en/)
  # is generated from it. English is the default, served at the site root "/";
  # Japanese is served at "/ja/". A language switcher appears in the header.
  # See TRANSLATING.md for the editing workflow.
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true
          site_name: HiCarta
          # Translate the nav labels (default-language titles -> Japanese).
          nav_translations:
            Home: ホーム
            Installation: インストール
            What HiCarta can do: できること
            Usage: 使い方
            Screens & controls: 画面と操作の説明
            Data formats: データ形式
            Setup & troubleshooting: セットアップ詳細・トラブルシューティング
